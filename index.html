<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ระบบรัฐสภาจำลอง</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; max-width: 500px; margin: auto; border: 1px solid #333; }
        .bar-bg { background: #333; height: 20px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .bar-fill { height: 100%; width: 0%; transition: 0.5s; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-agree { background: #2ecc71; color: white; }
        .btn-disagree { background: #e74c3c; color: white; }
        .btn-abstain { background: #f1c40f; }
        .btn-admin { background: #3498db; color: white; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🏛️ สรุปมติรัฐสภา</h1>
        <div id="status">สถานะ: รอเปิดประชุม</div>
        <hr>
        <p>เห็นชอบ: <span id="txt-agree">0</span></p>
        <div class="bar-bg"><div id="bar-agree" class="bar-fill" style="background:#2ecc71"></div></div>
        
        <p>ไม่เห็นชอบ: <span id="txt-disagree">0</span></p>
        <div class="bar-bg"><div id="bar-disagree" class="bar-fill" style="background:#e74c3c"></div></div>
        
        <p>งดออกเสียง: <span id="txt-abstain">0</span></p>
        <div class="bar-bg"><div id="bar-abstain" class="bar-fill" style="background:#f1c40f"></div></div>
        
        <h3>รวม: <span id="txt-total">0</span></h3>
    </div>

    <div id="vote-section" style="display:none;" class="card">
        <h3>ลงมติของท่าน</h3>
        <button class="btn-agree" onclick="castVote('agree')">เห็นชอบ</button>
        <button class="btn-disagree" onclick="castVote('disagree')">ไม่เห็นชอบ</button>
        <button class="btn-abstain" onclick="castVote('abstain')">งดออกเสียง</button>
    </div>

    <div class="card" style="margin-top:20px; border-color: #3498db;">
        <h4>ควบคุมโดยประธานสภา</h4>
        <button class="btn-admin" onclick="updateState('voting')">เปิดลงมติ</button>
        <button class="btn-admin" style="background:#e67e22" onclick="updateState('closed')">ปิด/สรุปผล</button>
        <button class="btn-admin" style="background:#7f8c8d" onclick="resetAll()">ล้างคะแนน</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // *** เปลี่ยนตรงนี้เป็น Config ของคุณ ***
        const firebaseConfig = {
  apiKey: "AIzaSyA11MHrohCgz4xGUUmqcoyc_DGQeSsOPAM",
  authDomain: "gameparliament-a2045.firebaseapp.com",
  projectId: "gameparliament-a2045",
  storageBucket: "gameparliament-a2045.firebasestorage.app",
  messagingSenderId: "356296704967",
  appId: "1:356296704967:web:217dbc3ce7ac7a76354fe2",
  measurementId: "G-1D339J2NL8"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "parliament", "live_data");

        // ติดตามข้อมูลแบบ Real-time
        onSnapshot(docRef, (snap) => {
            const d = snap.data();
            const total = (d.agree || 0) + (d.disagree || 0) + (d.abstain || 0);
            
            document.getElementById('txt-agree').innerText = d.agree || 0;
            document.getElementById('txt-disagree').innerText = d.disagree || 0;
            document.getElementById('txt-abstain').innerText = d.abstain || 0;
            document.getElementById('txt-total').innerText = total;

            if(total > 0) {
                document.getElementById('bar-agree').style.width = (d.agree/total*100) + "%";
                document.getElementById('bar-disagree').style.width = (d.disagree/total*100) + "%";
                document.getElementById('bar-abstain').style.width = (d.abstain/total*100) + "%";
            }

            // คุมการแสดงผลปุ่มโหวต
            const voteSec = document.getElementById('vote-section');
            if(d.state === 'voting') {
                document.getElementById('status').innerText = "🟢 สถานะ: กำลังลงมติ";
                if(!localStorage.getItem('voted')) voteSec.style.display = 'block';
            } else {
                voteSec.style.display = 'none';
                document.getElementById('status').innerText = d.state === 'closed' ? "🔴 สถานะ: ปิดรับโหวต" : "⚪ สถานะ: รอประชุม";
            }
        });

        window.castVote = async (type) => {
            await updateDoc(docRef, { [type]: increment(1) });
            localStorage.setItem('voted', 'true');
            alert("ลงมติเรียบร้อย");
        };

        window.updateState = async (s) => { await updateDoc(docRef, { state: s }); };
        window.resetAll = async () => {
            await setDoc(docRef, { agree: 0, disagree: 0, abstain: 0, state: 'idle' });
            localStorage.removeItem('voted');
        };
    </script>
</body>
</html>
