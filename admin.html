<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Admin - ประธานรัฐสภา</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #000; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin:0; }
        .card { background: #1a1a1a; padding: 40px; border-radius: 20px; width: 320px; border: 1px solid #333; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-b { background: #3498db; color: white; }
        .btn-g { background: #00ff88; color: black; }
        .btn-o { background: #e67e22; color: white; }
        .btn-w { background: #444; color: white; }
    </style>
</head>
<body>
    <div id="login" class="card">
        <h2>🔒 Admin Login</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button class="btn-b" onclick="auth()">เข้าสู่ระบบ</button>
    </div>

    <div id="ctrl" class="card" style="display:none;">
        <h2>🏛️ ควบคุมรัฐสภา</h2>
        <button class="btn-g" onclick="setS('voting')">▶️ เปิดการลงมติ</button>
        <button class="btn-o" onclick="setS('closed')">⏹️ ปิดมติ/สรุปผล</button>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <button class="btn-w" onclick="reset()">🔄 รีเซ็ตระบบเริ่มต้น</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyA11MHrohCgz4xGUUmqcoyc_DGQeSsOPAM", authDomain: "gameparliament-a2045.firebaseapp.com", projectId: "gameparliament-a2045", storageBucket: "gameparliament-a2045.firebasestorage.app", messagingSenderId: "356296704967", appId: "1:356296704967:web:217dbc3ce7ac7a76354fe2" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "parliament", "live_data");

        window.auth = () => {
            if(document.getElementById('u').value === "admin" && document.getElementById('p').value === "1234"){
                document.getElementById('login').style.display = 'none';
                document.getElementById('ctrl').style.display = 'block';
            } else { alert("รหัสผิด!"); }
        };

        window.setS = async (s) => { await updateDoc(docRef, { state: s }); alert("ดำเนินการเรียบร้อย"); };
        window.reset = async () => {
            if(confirm("ล้างคะแนนทั้งหมด?")){
                await setDoc(docRef, { agree:0, disagree:0, abstain:0, state:'idle' });
                alert("รีเซ็ตแล้ว");
            }
        };
    </script>
</body>
</html>
