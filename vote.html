<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงมติ - Member</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .box { background: #1a1a1a; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; font-size: 18px; }
        button { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 10px; font-weight: bold; font-size: 20px; cursor: pointer; }
        .btn-g { background: #00ff88; color: black; }
        .btn-r { background: #ff4d4d; color: white; }
        .btn-y { background: #ffcc00; color: black; }
    </style>
</head>
<body>
    <div id="app" class="box">
        <h2>🏛️ ลงมติสมาชิกสภา</h2>
        <div id="status">กำลังรอประธานเปิดโหวต...</div>
        <div id="form" style="display:none;">
            <input type="text" id="username" placeholder="ระบุชื่อ-นามสกุล ของท่าน">
            <button class="btn-g" onclick="sendVote('agree')">เห็นชอบ</button>
            <button class="btn-r" onclick="sendVote('disagree')">ไม่เห็นชอบ</button>
            <button class="btn-y" onclick="sendVote('abstain')">งดออกเสียง</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyA11MHrohCgz4xGUUmqcoyc_DGQeSsOPAM", authDomain: "gameparliament-a2045.firebaseapp.com", projectId: "gameparliament-a2045", storageBucket: "gameparliament-a2045.firebasestorage.app", messagingSenderId: "356296704967", appId: "1:356296704967:web:217dbc3ce7ac7a76354fe2" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const docRef = doc(db, "parliament", "live_data");

        onSnapshot(docRef, (snap) => {
            const d = snap.data();
            const form = document.getElementById('form');
            const status = document.getElementById('status');
            if(localStorage.getItem('voted')){
                status.innerText = "ท่านได้ลงมติเรียบร้อยแล้ว ✅";
                form.style.display = 'none';
            } else if(d.state === 'voting'){
                status.innerText = "🟢 กรุณาใส่ชื่อและกดลงมติ";
                form.style.display = 'block';
            } else {
                status.innerText = "🔴 ระบบยังไม่เปิดให้ลงมติ";
                form.style.display = 'none';
            }
        });

        window.sendVote = async (type) => {
            const name = document.getElementById('username').value;
            if(!name) return alert("กรุณาใส่ชื่อก่อนโหวต!");
            await updateDoc(docRef, { [type]: increment(1) });
            localStorage.setItem('voted', 'true');
            alert("บันทึกมติของ " + name + " เรียบร้อย");
        };
    </script>
</body>
</html>
